<!DOCTYPE html>
<html><head><title>Scan2Cart - Signing in...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a73e8;color:#fff;text-align:center;padding:20px}h2{margin-bottom:10px}</style>
</head>
<body>
<div>
  <h2>🛒 Scan2Cart</h2>
  <p id="status">Signing you in...</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    // Try to open the native app first
    window.location.href = 'scan2cart://auth?code=' + encodeURIComponent(code);
    // Fallback to web version after 2 seconds if app doesn't open
    setTimeout(() => {
      window.location.href = '/krog/?code=' + encodeURIComponent(code);
    }, 2000);
  } else {
    document.getElementById('status').textContent = 'Login failed. Please try again.';
    setTimeout(() => { window.location.href = '/krog/'; }, 2000);
  }
</script>
</body>
</html>
